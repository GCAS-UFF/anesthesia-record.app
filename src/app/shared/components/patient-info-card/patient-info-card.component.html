<div class="patient-card">
    <div class="header-section">
        <div class="patient-main-info">
            <span class="patient-label">PACIENTE</span>
            <h2 class="patient-name">{{ patientName || 'NOME NÃO INFORMADO' }}</h2>
        </div>
        <div class="record-badge" *ngIf="record">
            Prontuário: {{ record }}
        </div>
    </div>

    <div class="patient-meta">
        <div class="meta-item">
            <span class="meta-label">IDADE / NASCIMENTO</span>
            <span class="meta-value">{{ age || '--' }} Anos</span>
        </div>
        <div class="meta-item">
            <span class="meta-label">SALA / LEITO</span>
            <span class="meta-value">{{ room || '--' }}</span>
        </div>
        <div class="meta-item" *ngIf="procedure">
            <span class="meta-label">PROCEDIMENTO</span>
            <span class="meta-value">{{ procedure }}</span>
        </div>
    </div>

    <div class="allergy-alert" *ngIf="hasAllergies">
        <div class="allergy-container">
            <div class="allergy-icon">⚠️</div>
            <div class="allergy-content">
                <div class="allergy-title">ALERTA DE ALERGIA</div>
                <div class="allergy-text">{{ allergies.join(' • ') }}</div>
            </div>
        </div>
    </div>
</div>
