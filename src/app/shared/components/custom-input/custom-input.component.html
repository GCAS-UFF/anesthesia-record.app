<ion-item>
  <ion-icon *ngIf="icon" [name]="icon" slot="start"></ion-icon>
  <ion-label position="floating">{{ label }}</ion-label>
  <ion-input
    [type]="type"
    [placeholder]="placeholder"
    [(ngModel)]="value"
    [required]="required"
    [disabled]="disabled"
    (ionBlur)="onTouched()"
    (ionInput)="onChange($event.target.value)">
  </ion-input>
</ion-item>
