<div class="quick-input-container" *ngIf="vitalData" [class.saving]="isSaving">
    <div class="input-grid">
        <!-- HORÁRIO -->
        <div class="input-group time-group">
            <span class="input-label">Hora</span>
            <input type="text" [(ngModel)]="vitalData.time" placeholder="00:00" maxlength="5" class="vital-input time" [disabled]="isSaving" (keyup.enter)="pasInput.focus()">
        </div>

        <!-- PRESSÃO ARTERIAL SISTÓLICA -->
        <div class="input-group pa-group">
            <span class="input-label">PAS <small>(Sist)</small></span>
            <input type="number" [(ngModel)]="vitalData.pas" placeholder="--" min="0" max="300" class="vital-input pas" #pasInput [disabled]="isSaving" (keyup.enter)="padInput.focus()">
        </div>

        <!-- PRESSÃO ARTERIAL DIASTÓLICA -->
        <div class="input-group pa-group">
            <span class="input-label">PAD <small>(Diast)</small></span>
            <input type="number" [(ngModel)]="vitalData.pad" placeholder="--" min="0" max="250" class="vital-input pad" #padInput [disabled]="isSaving" (keyup.enter)="fcInput.focus()">
        </div>

        <!-- FREQUÊNCIA CARDÍACA -->
        <div class="input-group fc-group">
            <span class="input-label">FC <small>(bpm)</small></span>
            <input type="number" [(ngModel)]="vitalData.fc" placeholder="--" min="0" max="250" class="vital-input fc" #fcInput [disabled]="isSaving" (keyup.enter)="spo2Input.focus()">
        </div>

        <!-- SATURAÇÃO -->
        <div class="input-group spo2-group">
            <span class="input-label">SpO₂ <small>(%)</small></span>
            <input type="number" [(ngModel)]="vitalData.spo2" placeholder="--" min="0" max="100" class="vital-input spo2" #spo2Input [disabled]="isSaving" (keyup.enter)="tempInput.focus()">
        </div>

        <!-- TEMPERATURA -->
        <div class="input-group temp-group">
            <span class="input-label">TEMP <small>(°C)</small></span>
            <input type="number" [(ngModel)]="vitalData.temp" placeholder="--" min="30" max="45" step="0.1" class="vital-input temp" #tempInput [disabled]="isSaving" (keyup.enter)="etco2Input.focus()">
        </div>

        <!-- EtCO2 -->
        <div class="input-group etco2-group">
            <span class="input-label">EtCO₂ <small>(mmHg)</small></span>
            <input type="number" [(ngModel)]="vitalData.etco2" placeholder="--" min="0" max="150" class="vital-input etco2" #etco2Input [disabled]="isSaving" (keyup.enter)="save()">
        </div>

        <!-- CAMPOS CUSTOMIZADOS -->
        <div class="input-group custom-group" *ngFor="let field of customFields">
            <span class="input-label">{{ field.label }}</span>
            <input type="text" [(ngModel)]="vitalData.custom![field.key]" placeholder="--" class="vital-input custom" [disabled]="isSaving">
        </div>

        <!-- BOTÕES DE AÇÃO -->
        <div class="action-group">
            <button class="btn-confirm" (click)="save()" [disabled]="isSaving">
                <ion-spinner name="crescent" *ngIf="isSaving"></ion-spinner>
                <ion-icon name="checkmark-circle" *ngIf="!isSaving"></ion-icon>
            </button>
            <button class="btn-cancel" (click)="clear()" [disabled]="isSaving">
                <ion-icon name="trash-outline"></ion-icon>
            </button>
        </div>
    </div>
</div>
