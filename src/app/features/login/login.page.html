<div class="fullscreen-container">
    <!-- Status Bar -->
    <div class="status-bar">
        <span class="time">10:31</span>
        <span class="date">Sábado, 21 de Março</span>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo-wrapper">
                    <img src="assets/Logo.png" alt="Logo do Sistema" class="login-logo-img">
                </div>
                <h1 class="login-system-name">Sistema Interno de Gerenciamento Anestésico</h1>
            </div>

            <!-- Mensagem de Erro -->
            <app-error-message [message]="error || ''"></app-error-message>

            <!-- Status de Conexão -->
            <app-connection-status></app-connection-status>

            <!-- Formulário -->
            <form [formGroup]="form" (ngSubmit)="submit()" autocomplete="off">
                <app-custom-input
                    label="Usuário"
                    icon="👨‍⚕️"
                    inputIcon="📋"
                    type="text"
                    placeholder="Digite seu usuário"
                    [required]="true"
                    autocomplete="one-time-code"
                    (focused)="clearError()"
                    formControlName="username">
                </app-custom-input>

                <app-custom-input
                    label="Senha"
                    icon="🔒"
                    inputIcon="●"
                    type="password"
                    placeholder="Digite sua senha"
                    [required]="true"
                    autocomplete="new-password"
                    (focused)="clearError()"
                    formControlName="password">
                </app-custom-input>

                <div class="form-options">
                    <a href="#" class="forgot-link">Esqueceu a senha?</a>
                </div>

                <app-loading-button
                    [loading]="loading"
                    [disabled]="form.invalid"
                    type="submit">
                    <span>→</span>
                    <span>ENTRAR</span>
                </app-loading-button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="footer-text">
            Sistema Interno de Gerenciamento Anestésico - v1.0 • <a href="#">Suporte</a> • <a href="#">Política de Privacidade</a>
        </div>
    </div>
</div>
