<div class="app-container">
    <app-status-bar></app-status-bar>
    <app-header-institucional [showLogout]="true"></app-header-institucional>

    <div class="main-content">
        <!-- Header de Navegação -->
        <div class="navigation-header">
            <ion-button fill="outline" (click)="voltar()" class="btn-back">
                <ion-icon name="arrow-back-outline" slot="start"></ion-icon>
                Voltar
            </ion-button>
            <h1 class="page-title">Ficha Anestésica</h1>
            <div class="action-header-btns">
                <div style="width: 100px;"></div> <!-- Spacer -->
            </div>
        </div>

        <!-- Card do Paciente -->
        <app-patient-info-card 
            [patientName]="patient?.fullName || ''"
            [age]="patient?.age?.toString() || ''"
            [record]="patient?.medicalRecordNumber || ''"
            [procedure]="selectedProcedure?.description || ''"
            [room]="selectedSurgery?.location?.room || ''"
            [allergies]="patient?.allergies || []">
        </app-patient-info-card>

        <form [formGroup]="form" (ngSubmit)="salvar()">
            
            <div class="form-grid-2col">
                <!-- SEÇÃO: SEGURANÇA -->
                <app-form-section title="Segurança do Paciente" icon="🛡️" formGroupName="seguranca">
                    <div class="checklist-grid" style="grid-template-columns: 1fr;">
                        <div class="checklist-item"><ion-checkbox formControlName="identificacaoConfirmada">Identificação do Paciente Confirmada</ion-checkbox></div>
                        <div class="checklist-item"><ion-checkbox formControlName="sitioCirurgicoMarcado">Sítio Cirúrgico Marcado</ion-checkbox></div>
                        <div class="checklist-item"><ion-checkbox formControlName="consentimentoAssinado">Consentimento Anestésico Assinado</ion-checkbox></div>
                        <div class="checklist-item"><ion-checkbox formControlName="equipamentosTestados">Equipamentos e Materiais Testados</ion-checkbox></div>
                    </div>
                </app-form-section>

                <!-- SEÇÃO: EQUIPE -->
                <app-form-section title="Equipe Cirúrgica" icon="👨‍⚕️" formGroupName="equipe">
                    <div class="form-grid">
                        <app-form-field label="Anestesista Responsável" [required]="true"><input type="text" formControlName="anestesistaResponsavel"></app-form-field>
                        <app-form-field label="Cirurgião Responsável" [required]="true"><input type="text" formControlName="cirurgiao"></app-form-field>
                    </div>
                </app-form-section>
            </div>

            <!-- SEÇÃO: DADOS VITAIS -->
            <app-form-section title="Dados Vitais (Antes da Indução)" icon="📊" formGroupName="dadosVitais">
                <div class="vitals-grid">
                    <app-form-field label="PA Sistólica" [required]="true"><input type="number" formControlName="paSistolica"></app-form-field>
                    <app-form-field label="PA Diastólica" [required]="true"><input type="number" formControlName="paDiastolica"></app-form-field>
                    <app-form-field label="FC (bpm)" [required]="true"><input type="number" formControlName="fc"></app-form-field>
                    <app-form-field label="SpO2 (%)" [required]="true"><input type="number" formControlName="spo2"></app-form-field>
                    <app-form-field label="Temp. (°C)"><input type="number" formControlName="temperatura"></app-form-field>
                </div>
            </app-form-section>

            <!-- SEÇÃO: TÉCNICA (Resumida para o card 40) -->
            <app-form-section title="Técnica e Posicionamento" icon="⚕️" formGroupName="tecnica">
                <div class="form-grid">
                    <app-checkbox-group label="Posição Operatória" [options]="posicaoOptions" formControlName="posicoesOperatorias" [required]="true"></app-checkbox-group>
                    <div class="form-grid-2col">
                        <app-checkbox-group label="Acesso Venoso" [options]="acessoVenosoOptions" formControlName="acessosVenoso" [required]="true" direction="vertical"></app-checkbox-group>
                        <app-checkbox-group label="Respiração" [options]="respiracaoOptions" formControlName="respiracao" [required]="true" direction="vertical"></app-checkbox-group>
                    </div>
                </div>
            </app-form-section>

            <!-- SEÇÃO: ALDERETE -->
            <app-form-section title="Índice de Alderete e Kroulik" icon="📋" formGroupName="alderete">
                <div class="alderete-grid">
                    <div class="alderete-item" *ngFor="let item of aldereteFields">
                        <label class="alderete-label">{{ item.label }}</label>
                        <select [formControlName]="item.control">
                            <option value="">--</option>
                            <option *ngFor="let opt of item.options" [value]="opt.score">{{ opt.score }} - {{ opt.text }}</option>
                        </select>
                    </div>
                </div>
            </app-form-section>

            <!-- SEÇÃO: ASSINATURAS (Igual à imagem) -->
            <app-form-section title="Assinaturas" icon="✍️" formGroupName="assinaturas">
                <div class="form-grid-3col">
                    <app-form-field label="1ª Anestesiologista" [required]="true">
                        <input type="text" formControlName="primeiroAnestesista" placeholder="Assinatura / Carimbo">
                    </app-form-field>
                    <app-form-field label="2ª Anestesiologista">
                        <input type="text" formControlName="segundoAnestesista" placeholder="Assinatura / Carimbo">
                    </app-form-field>
                    <app-form-field label="Data" [required]="true">
                        <input type="date" formControlName="dataAssinatura">
                    </app-form-field>
                </div>
            </app-form-section>

            <!-- BOTÕES DE AÇÃO (Igual à imagem) -->
            <div class="form-actions">
                <ion-button color="primary" type="submit" class="btn-pill">
                    <ion-icon name="save-outline" slot="start"></ion-icon>
                    Salvar Ficha Anestésica
                </ion-button>
                <ion-button fill="outline" (click)="confirmarLimpeza()" class="btn-pill btn-secondary">
                    <ion-icon name="sync-outline" slot="start"></ion-icon>
                    Limpar Formulário
                </ion-button>
                <ion-button fill="outline" (click)="imprimir()" class="btn-pill btn-secondary">
                    <ion-icon name="print-outline" slot="start"></ion-icon>
                    Imprimir
                </ion-button>
            </div>
        </form>
    </div>
</div>
